<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Store | أورا للمقتنيات</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; }
        header { background-color: #1a1a1a; color: white; padding: 20px; text-align: center; }
        header h1 { margin: 0; font-size: 28px; letter-spacing: 2px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .product-card { background: white; border: 1px solid #ddd; border-radius: 8px; width: 280px; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .product-card h3 { font-size: 18px; margin: 15px 0 10px; color: #333; }
        .product-card .price { font-size: 16px; color: #b12704; font-weight: bold; margin-bottom: 15px; }
        .no-products { font-size: 18px; color: #777; margin-top: 5px; width: 100%; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>AURA STORE</h1>
    <p>EYEWEAR & ACCESSORIES</p>
</header>

<div class="container" id="productsContainer">
    <p class="no-products">جاري تحميل المنتجات العالمية...</p>
</div>

<script>
    async function loadProducts() {
        const container = document.getElementById('productsContainer');
        try {
            // 🛠️ تم التعديل هنا: جلب المنتجات بشكل نسبي ومباشر لتعمل عند كل الناس في نفس الوقت
            const response = await fetch('/api/products');
            const products = await response.json();

            if (products.length === 0) {
                container.innerHTML = '<p class="no-products">لا توجد قطع معروضة في الوقت الحالي.</p>';
                return;
            }

            container.innerHTML = '';
            products.forEach(product => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${product.image}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <div class="price">$${product.price}</div>
                    </div>
                `;
            });
        } catch (error) {
            console.error(error);
            container.innerHTML = '<p class="no-products" style="color:red;">❌ خطأ في تحميل المنتجات من السيرفر العالمي!</p>';
        }
    }

    // تشغيل الدالة تلقائياً أول ما تفتح الصفحة
    loadProducts();
</script>

</body>
</html>
