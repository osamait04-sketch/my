<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Store | أورا للمقتنيات</title>
    <style>
        :root {
            --primary-color: #231f20;
            --accent-color: #c5a059; /* اللون البيج الذهبي الفخم من الصورة */
            --bg-color: #faf6f0;     /* الخلفية الكريمية الدافئة */
            --card-bg: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 0; 
            color: #333; 
        }
        header { 
            background-color: var(--card-bg); 
            color: var(--primary-color); 
            padding: 35px 20px; 
            text-align: center; 
            border-bottom: 1px solid #eae3d8;
        }
        header h1 { margin: 0; font-size: 30px; letter-spacing: 4px; font-weight: bold; color: #1a1a1a; }
        header p { margin: 8px 0 0; font-size: 13px; letter-spacing: 2px; color: #7a7267; font-weight: 500; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        
        .product-card { 
            background: var(--card-bg); 
            border-radius: 0px; /* تصميم كلاسيكي حاد وحواف ناعمة جداً حسب الهوية */
            width: 280px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            border: 1px solid #eae3d8; 
            box-sizing: border-box;
        }
        .product-card img { max-width: 100%; height: 240px; object-fit: cover; border-radius: 0px; }
        .product-card h3 { font-size: 18px; margin: 15px 0 8px; color: #222; font-weight: 600; }
        .product-card .price { font-size: 17px; color: #231f20; font-weight: bold; margin-bottom: 15px; }
        
        .buy-btn { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--accent-color); 
            color: white; 
            border: none; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer;
