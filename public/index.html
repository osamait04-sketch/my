<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Store | أورا للمقتنيات</title>
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #b12704;
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: #333; }
        header { background-color: var(--primary-color); color: white; padding: 30px 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 32px; letter-spacing: 3px; font-weight: bold; }
        header p { margin: 5px 0 0; font-size: 14px; letter-spacing: 1px; color: #bbb; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        
        .product-card { background: var(--card-bg); border-radius: 12px; width: 280px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s ease; border: 1px solid #eee; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { max-width: 100%; height: 220px; object-fit: cover; border-radius: 8px; }
        .product-card h3 { font-size: 19px; margin: 15px 0 8px; color: #222; }
        .product-card .price { font-size: 18px; color: var(--accent-color); font-weight: bold; margin-bottom: 15px; }
        
        .buy-btn { width: 100%; padding: 10px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .buy-btn:hover { background-color: #333; }
        
        /* مودال / نافذة الشراء المنبثقة */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.2); position: relative; }
        .modal h3 { margin-top: 0; color: #222; font-size: 22px; }
        .modal input, .modal textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .modal textarea { height: 80px; resize: none; }
        .submit-order-btn { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 6px; font-size: 16px; font
