<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Store | أورا للمقتنيات</title>
    <style>
        :root {
            --primary-color: #231f20;
            --accent-color: #c5a059; 
            --bg-color: #faf6f0;     
            --card-bg: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 0; 
            color: #333; 
        }
        header { 
            background-color: var(--card-bg); 
            color: var(--primary-color); 
            padding: 35px 20px; 
            text-align: center; 
            border-bottom: 1px solid #eae3d8;
        }
        header h1 { margin: 0; font-size: 30px; letter-spacing: 4px; font-weight: bold; color: #1a1a1a; }
        header p { margin: 8px 0 0; font-size: 13px; letter-spacing: 2px; color: #7a7267; font-weight: 500; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        
        .product-card { 
            background: var(--card-bg); 
            border-radius: 4px; 
            width: 280px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            border: 1px solid #eae3d8; 
            box-sizing: border-box;
        }
        .product-card img { max-width: 100%; height: 240px; object-fit: cover; border-radius: 4px; }
        .product-card h3 { font-size: 18px; margin: 15px 0 8px; color: #222; font-weight: 600; }
        .product-card .price { font-size: 17px; color: #231f20; font-weight: bold; margin-bottom: 15px; }
        
        .buy-btn { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--accent-color); 
            color: white; 
            border: none; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s; 
            border-radius: 4px;
        }
        .buy-btn:hover { background-color: #b38f4b; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 4px; width: 90%; max-width: 450px; text-align: center; border: 1px solid #eae3d8; position: relative; }
        .modal h3 { margin-top: 0; color: #222; font-size: 20px; }
        .modal input, .modal textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; background: #fafafa; border-radius: 4px; text-align: right; }
        .modal textarea { height: 80px; resize: none; }
        
        .submit-order-btn { width: 100%; padding: 12px; background-color: var(--accent-color); color: white; border: none; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .submit-order-btn:hover { background-color: #b38f4b; }
        .close-btn { position: absolute; top: 10px; left: 15px; font-size: 22px; cursor: pointer; color: #999; }
        
        .no-products { font-size: 16px; color: #7a7267; width: 100%; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>AURA STORE</h1>
    <p>EYEWEAR & ACCESSORIES</p>
</header>

<div class="container" id="productsContainer">
    <p class="no-products">جاري تحميل تشكيلة أورا الفاخرة...</p>
</div>

<div class="modal" id="orderModal">
    <div class="modal-content">
        <span class="close-btn" id="closeBtn">&times;</span>
        <h3>🛍️ إتمام طلب الشراء</h3>
        <p id="selectedProductName" style="font-weight: bold; color: #555; margin-bottom: 20px;"></p>
        <form id="orderForm">
            <input type="text" id="customerName" placeholder="اسمك الكامل" required>
            <input type="tel" id="customerPhone" placeholder="رقم الهاتف (واتساب)" required>
            <textarea id="customerAddress" placeholder="عنوان التوصيل الكامل (المحافظة / الحي / أقرب نقطة دالة)" required></textarea>
            <button type="submit" class="submit-order-btn">تأكيد وإرسال الطلب</button>
        </form>
    </div>
</div>

<script>
    let currentProductName = "";
    let currentProductPrice = 0;

    function formatIQD(number) {
        return Number(number).toLocaleString('en-US') + " د.ع";
    }

    async function loadProducts() {
        const container = document.getElementById('productsContainer');
        try {
            const response = await fetch('/api/products?t=' + new Date().getTime());
            const products = await response.json();

            if (!products || products.length === 0) {
                container.innerHTML = '<p class="no-products">لا توجد قطع معروضة حالياً. انتظروا تشكيلتنا الجديدة!</p>';
                return;
            }

            container.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <div class="price">${formatIQD(product.price)}</div>
                    <button class="buy-btn">شراء الآن</button>
                `;
                
                card.querySelector('.buy-btn').addEventListener('click', () => {
                    openModal(product.name, product.price);
                });
                
                container.
