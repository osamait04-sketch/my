<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة الفاخرة | Aura Store</title>
    <style>
        :root {
            --accent-color: #c5a059; 
            --bg-color: #faf6f0;     
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }
        .container { 
            max-width: 600px; 
            background: white; 
            padding: 30px; 
            margin: 30px auto; 
            border-radius: 4px; 
            box-shadow: 0px 4px 20px rgba(0,0,0,0.02); 
            border: 1px solid #eae3d8; 
        }
        
        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin-top: 40px;
            margin-bottom: 20px;
            color: #231f20;
            border-top: 1px solid #eae3d8;
            padding-top: 25px;
            text-align: center;
        }

        label {
            display: block;
            text-align: right;
            font-weight: 600;
            margin-bottom: 5px;
            color: #231f20;
            font-size: 15px;
        }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #ddd; 
            background-color: #fff;
            box-sizing: border-box; 
            font-size: 14px; 
            text-align: right;
            border-radius: 4px;
        }
        
        .submit-btn { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--accent-color); 
            color: white; 
            border: none; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s; 
            border-radius: 4px;
        }
        .submit-btn:hover { background-color: #b38f4b; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th { background-color: #fcfbf9; padding: 12px; border-bottom: 2px solid #eae3d8; font-weight: bold; font-size: 15px; color: #231f20; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; text-align: center; }
        
        table img { width: 50px; height: 50px; object-fit: cover; }

        .delete-btn {
            background: transparent;
            color: #b23b3b;
            border: 1px solid #b23b3b;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            transition: all 0.2s;
            border-radius: 4px;
        }
        .delete-btn:hover {
            background: #b23b3b;
            color: white;
        }
        
        .msg { margin-top: 15px; font-weight: bold; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #231f20; margin-bottom: 25px;">➕ إضافة منتج جديد للمتجر</h2>
    <form id="productForm">
        <label>المسمى / اسم المنتج:</label>
        <input type="text" id="name" placeholder="مثال: نظارة كلاسيك فخمة" required>
        
        <label>السعر الحصري بالدينار العراقي (د.ع):</label>
        <input type="number" id="price" placeholder="مثال: 25000" required>
        
        <label>رابط الصورة الكاملة:</label>
        <input type="text" id="image" placeholder="ضع رابط الصورة هنا">
        
        <button type="submit" class="submit-btn">✨ نشر وعرض المنتج</button>
    </form>
    <div id="message" class="msg"></div>

    <div class="section-title">📦 المجموعات المعروضة حالياً</div>
    
    <table>
        <thead>
            <tr>
                <th>التصميم</th>
                <th>المسمى</th>
                <th>القيمة</th>
                <th>التحكم</th>
            </tr>
        </thead>
        <tbody id="adminProductsList">
            </tbody>
    </table>
</div>

<script>
    function formatIQD(number) {
        return Number(number).toLocaleString('en-US') + " د.ع";
    }

    async function loadAdminProducts() {
        const tbody = document.getElementById('adminProductsList');
        try {
            const response = await fetch('/api/products?t=' + new Date().getTime());
            const products = await response.json();
            
            tbody.innerHTML = '';
            if(!products || products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="color:#999;">لا توجد قطع معروضة حالياً</td></tr>';
                return;
            }

            products.forEach(product => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><img src="${product.image}" alt=""></td>
                    <td style="font-weight:600; color:#231f20;">${product.name}</td>
                    <td style="color:#c5a059; font-weight:bold;">${formatIQD(product.price)}</td>
                    <td>
                        <button class="delete-btn" data-id="${product._id}">
                            🗑️ <br> سحب القطعة
                        </button>
                    </td>
                `;

                row.querySelector('.delete-btn').addEventListener('click', async () => {
                    if(confirm(`هل أنت متأكد من سحب قطعة "${product.name}" من العرض؟`)) {
                        try {
                            const delRes = await fetch(`/api/products/${product._id}`, { method: 'DELETE' });
                            const delData = await delRes.json();
                            if(delData.success) {
                                alert('🗑️ تم سحب القطعة بنجاح!');
                                loadAdminProducts();
                            } else {
                                alert('❌ فشل سحب القطعة.');
                            }
                        } catch (err) {
                            console.error(err);
                            alert('❌ خطأ في الاتصال.');
                        }
                    }
                });

                tbody.appendChild(row);
            });
        } catch (error) {
            console.error(error);
            tbody.innerHTML = '<tr><td colspan="4" style="color:red;">خطأ في تحميل البيانات</td></tr>';
        }
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;
        const image = document.getElementById('image').value || 'https://via.placeholder.com/280';
        const messageDiv = document.getElementById('message');

        try {
            const response = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price: Number(price), image })
            });

            const data = await response.json();
            if (data.success) {
                messageDiv.style.color = '#27ae60';
                messageDiv.innerText = '✅ تم حفظ المنتج بنجاح!';
                document.getElementById('productForm').reset();
                loadAdminProducts();
            } else {
                messageDiv.style.color = '#c0392b';
                messageDiv.innerText = '❌ فشل حفظ المنتج!';
            }
        } catch (error) {
            console.error(error);
            messageDiv.style.color = '#c0392b';
            messageDiv.innerText = '❌ خطأ في الاتصال بالسيرفر!';
        }
    });

    loadAdminProducts();
</script>

</body>
</html>
