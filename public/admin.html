<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - Aura Store</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; background: white; padding: 30px; margin: 50px auto; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { color: #222; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1a1a1a; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #333; }
        .msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>➕ إضافة منتج جديد للمتجر</h2>
    <form id="productForm">
        <input type="text" id="name" placeholder="اسم القطعة (مثال: نظارة فاخرة)" required>
        <input type="number" id="price" placeholder="السعر بالدولار ($)" required>
        <input type="text" id="image" placeholder="رابط صورة المنتج (اختياري)">
        <button type="submit">حفظ ونشر المنتج العالمي</button>
    </form>
    <div id="message" class="msg"></div>
</div>

<script>
    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;
        const image = document.getElementById('image').value || 'https://via.placeholder.com/280';
        const messageDiv = document.getElementById('message');

        try {
            // 🛠️ تم التعديل هنا: استخدام مسار نسبي ليتم الحفظ في السيرفر العالمي الحقيقي فوراً من أي جهاز
            const response = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price: Number(price), image })
            });

            const data = await response.json();
            if (data.success) {
                messageDiv.style.color = 'green';
                messageDiv.innerText = '✅ تم حفظ المنتج بنجاح وظهر لكل الزباين الحين!';
                document.getElementById('productForm').reset();
            } else {
                messageDiv.style.color = 'red';
                messageDiv.innerText = '❌ فشل حفظ المنتج!';
            }
        } catch (error) {
            console.error(error);
            messageDiv.style.color = 'red';
            messageDiv.innerText = '❌ خطأ في الاتصال بالسيرفر!';
        }
    });
</script>

</body>
</html>
